name: Preview

on:
  push:
    branches: ["web-**"]
  delete:

jobs:
  deploy-preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - name: Compute slug, worker name, and host
        id: slug
        run: node scripts/preview-slug.mjs "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - name: Build web (preview auth base URL)
        env:
          AUTH_BASE_URL: https://auth.preview.civicdoodie.org
        run: cd web && npm ci && npm run build
      - run: npm run typecheck
      - name: Generate wrangler.deploy.json
        env:
          STAGING_D1_DATABASE_ID: ${{ secrets.STAGING_D1_DATABASE_ID }}
          PROD_D1_DATABASE_ID:    ${{ secrets.PROD_D1_DATABASE_ID }}
          PREVIEW_NAME:           ${{ steps.slug.outputs.name }}
          PREVIEW_HOST:           ${{ steps.slug.outputs.host }}
        run: node scripts/build-wrangler-deploy.mjs
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.deploy.json --env preview
      - name: Seed BETTER_AUTH_SECRET into preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          printf "%s" "${{ secrets.PREVIEW_BETTER_AUTH_SECRET }}" \
            | npx wrangler secret put BETTER_AUTH_SECRET \
              --config wrangler.deploy.json --env preview
      - name: Smoke test (non-blocking)
        # The deploy step above is the real gate. This step just reports
        # whether the custom-domain URL is reachable yet. On first-ever deploy
        # of a hostname, Cloudflare's Universal SSL cert can take 1-15 minutes
        # to issue; subsequent deploys are instant. Never fail the workflow
        # on this check.
        run: |
          URL="https://${{ steps.slug.outputs.host }}"
          for i in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --max-time 5 "$URL/" > /dev/null 2>&1; then
              echo "✅ Preview ready at $URL" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 5
          done
          {
            echo "⏳ Preview deployed but URL not yet reachable: $URL"
            echo ""
            echo "This is normal on first deploy of a new hostname — Cloudflare's"
            echo "Universal SSL cert can take a few minutes to issue. Try the URL"
            echo "again in 5-10 minutes."
          } >> "$GITHUB_STEP_SUMMARY"

  delete-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'web-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "24" }
      - run: npm ci
      - name: Compute worker name
        id: slug
        run: node scripts/preview-slug.mjs "${{ github.event.ref }}" >> "$GITHUB_OUTPUT"
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: delete ${{ steps.slug.outputs.name }}
