name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: cd web && npm ci
      - run: npm run preflight

  deploy-staging:
    needs: preflight
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: cd web && npm ci && npm run build
      - name: Generate wrangler.deploy.json
        env:
          STAGING_D1_DATABASE_ID: ${{ secrets.STAGING_D1_DATABASE_ID }}
          PROD_D1_DATABASE_ID: ${{ secrets.PROD_D1_DATABASE_ID }}
        run: node scripts/build-wrangler-deploy.mjs
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.deploy.json --env staging

  deploy-production:
    needs: preflight
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: cd web && npm ci && npm run build
      - name: Generate wrangler.deploy.json
        env:
          STAGING_D1_DATABASE_ID: ${{ secrets.STAGING_D1_DATABASE_ID }}
          PROD_D1_DATABASE_ID: ${{ secrets.PROD_D1_DATABASE_ID }}
        run: node scripts/build-wrangler-deploy.mjs
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.deploy.json --env prod
